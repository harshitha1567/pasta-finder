<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Recipe Finder</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f8f8f8;
    }
    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
        text-align: center;
        margin-bottom: 20px;
    }
    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }
    textarea, input, button {
        width: 100%;
        margin-top: 5px;
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: 1px solid #ddd;
        outline: none;
    }
    button {
        background: #4CAF50;
        color: white;
        cursor: pointer;
        border: none;
        margin-top: 20px;
    }
    button:hover {
        background: #45a049;
    }
    .recipe-card {
        background: #fff7e6;
        padding: 15px;
        margin-top: 20px;
        border-left: 5px solid #ffa502;
        border-radius: 6px;
    }
    .steps {
        margin-top: 10px;
        padding-left: 20px;
    }
    .step {
        margin-bottom: 10px;
        padding: 10px;
        background: #fafafa;
        border-radius: 5px;
        border-left: 3px solid #ccc;
    }
    .yt-link {
        margin-top: 5px;
        display: inline-block;
        color: #1a73e8;
        text-decoration: none;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Smart Recipe Finder</h1>

    <label>Ingredients You Have (comma-separated)</label>
    <textarea id="ingredients" placeholder="pasta, garlic, tomatoes, milk"></textarea>

    <label>Type of Food You Want</label>
    <input id="type" placeholder="pasta / rice / curry / dessert...">

    <label>Allergies (comma-separated)</label>
    <input id="allergies" placeholder="milk, nuts, eggs">

    <button onclick="findRecipe()">Find Recipes</button>

    <div id="results"></div>
</div>

<script>
async function findRecipe() {
    const ingredients = document.getElementById("ingredients").value
        .split(",").map(s => s.trim()).filter(Boolean);

    const type = document.getElementById("type").value.trim();

    const allergies = document.getElementById("allergies").value
        .split(",").map(s => s.trim()).filter(Boolean);

    const payload = {
        ingredients: ingredients,
        desired_type: type,
        allergies: allergies,
        allow_substitutions: true,
        use_youtube: true
    };

    const resBox = document.getElementById("results");
    resBox.innerHTML = "<p>Loading...</p>";

    try {
        const response = await fetch("http://127.0.0.1:5000/api/recipe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        console.log("API Response:", data);

        resBox.innerHTML = "";

        // ---------------------------------------------------
        // 🔥 CASE 1: AI GENERATED RECIPE (no DB match)
        // ---------------------------------------------------
        if (data.ai_generated === true && data.recipe) {
    const recipe = data.recipe;

    const card = document.createElement("div");
    card.className = "recipe-card";

    card.innerHTML = `
        <h2> AI-Generated Recipe: ${recipe.name}</h2>
        <p><strong>Ingredients:</strong> ${recipe.ingredients_required.join(", ")}</p>

        <h3>Steps:</h3>
        <div class="steps">
            ${recipe.steps.map((s, i) => `
                <div class="step">
                    <strong>Step ${i + 1}:</strong> ${s.text}
                </div>
            `).join("")}
        </div>
    `;

    resBox.appendChild(card);
    return;  // done
}


        // ---------------------------------------------------
        // 🔥 CASE 2: DB RECIPES FOUND
        // ---------------------------------------------------
        if (!data.candidates || data.candidates.length === 0) {
            resBox.innerHTML = "<p>No recipes found.</p>";
            return;
        }

        data.candidates.forEach(recipe => {
            const card = document.createElement("div");
            card.className = "recipe-card";

            card.innerHTML = `
                <h2>${recipe.name}</h2>
                <p><strong>Type:</strong> ${recipe.type}</p>

                <p><strong>Missing Ingredients:</strong> 
                    ${recipe.missing_ingredients.length > 0 
                        ? recipe.missing_ingredients.join(", ") 
                        : "None 🎉"}
                </p>

                <p><strong>Substitutes:</strong></p>
                <ul>
                    ${Object.keys(recipe.substitutes).length > 0 
                        ? Object.entries(recipe.substitutes)
                            .map(([k,v]) => `<li>${k}: ${v.join(", ")}</li>`).join("")
                        : "<li>No substitutes needed</li>"
                    }
                </ul>

                <h3>Steps:</h3>
                <div class="steps">
                    ${recipe.steps.map((step, idx) => `
                        <div class="step">
                            <strong>Step ${idx+1}:</strong> ${step.text}
                            ${step.note ? `<p style="color:red">${step.note}</p>` : ""}
                            ${step.youtube 
                                ? `<a class="yt-link" href="${step.youtube}" target="_blank">📺 Watch Video</a>` 
                                : ""
                            }
                        </div>
                    `).join("")}
                </div>
            `;

            resBox.appendChild(card);
        });

    } catch (err) {
        console.error(err);
        resBox.innerHTML = "<p>Error connecting to server.</p>";
    }
}

</script>

</body>
</html>
